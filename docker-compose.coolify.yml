services:
  metabase:
    image: metabase/metabase:latest
    volumes:
      - /dev/urandom:/dev/random:ro
    environment:
      - SERVICE_FQDN_METABASE_3000=https://betty-metabase.app.t3ai.xyz
      - MB_SITE_NAME=Betty
      - MB_DB_TYPE=postgres
      - MB_DB_HOST=postgresql
      - MB_DB_PORT=5432
      - MB_DB_DBNAME=${POSTGRESQL_DATABASE:-betty_metabase}
      - MB_DB_USER=${SERVICE_USER_POSTGRESQL}
      - MB_DB_PASS=${SERVICE_PASSWORD_POSTGRESQL}
    depends_on:
      postgresql:
        condition: service_healthy
    healthcheck:
      test: curl --fail -I http://127.0.0.1:3000/api/health || exit 1
      interval: 5s
      timeout: 20s
      retries: 10
    labels:
      - traefik.http.routers.http-betty-metabase.entryPoints=http
      - traefik.http.routers.http-betty-metabase.middlewares=redirect-to-https
      - traefik.http.routers.http-betty-metabase.rule=Host(`betty-metabase.app.t3ai.xyz`) && PathPrefix(`/`)
      - traefik.http.routers.http-betty-metabase.service=http-betty-metabase
      - traefik.http.services.http-betty-metabase.loadbalancer.server.port=3000
      - traefik.http.routers.https-betty-metabase.entryPoints=https
      - traefik.http.routers.https-betty-metabase.middlewares=gzip
      - traefik.http.routers.https-betty-metabase.rule=Host(`betty-metabase.app.t3ai.xyz`) && PathPrefix(`/`)
      - traefik.http.routers.https-betty-metabase.service=https-betty-metabase
      - traefik.http.routers.https-betty-metabase.tls=true
      - traefik.http.routers.https-betty-metabase.tls.certresolver=letsencrypt
      - traefik.http.services.https-betty-metabase.loadbalancer.server.port=3000

  postgresql:
    image: postgres:16-alpine
    volumes:
      - betty-metabase-postgresql-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${SERVICE_USER_POSTGRESQL}
      - POSTGRES_PASSWORD=${SERVICE_PASSWORD_POSTGRESQL}
      - POSTGRES_DB=${POSTGRESQL_DATABASE:-betty_metabase}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}
      interval: 5s
      timeout: 20s
      retries: 10

volumes:
  betty-metabase-postgresql-data:
